<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    html, body {
      margin: 0; height: 100%;
      background: #0f172a; color: #e2e8f0;
      font-family: system-ui, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .logo { font-size: 26px; font-weight: 700; color: #38bdf8; letter-spacing: 0.5px; }
    .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    .status { margin-top: 28px; font-size: 14px; color: #cbd5e1; min-height: 20px; }
    .bar { margin-top: 16px; width: 240px; height: 4px; background: #1e293b; border-radius: 9999px; overflow: hidden; }
    .bar::after {
      content: ""; display: block; height: 100%; width: 40%;
      background: #38bdf8; border-radius: 9999px;
      animation: slide 1.2s ease-in-out infinite;
    }
    @keyframes slide { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
  </style>
</head>
<body>
  <div class="logo">WarrantyLens</div>
  <div class="sub">AI EV Warranty Inspection Assistant</div>
  <div class="status" id="status">Starting…</div>
  <div class="bar"></div>
  <script>
    window.setStatus = (t) => { document.getElementById("status").textContent = t; };
  </script>
</body>
</html>

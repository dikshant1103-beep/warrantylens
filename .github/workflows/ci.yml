name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: warrantylens
          POSTGRES_PASSWORD: warrantylens
          POSTGRES_DB: warrantylens_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U warrantylens"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://warrantylens:warrantylens@localhost:5432/warrantylens_test
      JWT_SECRET: ci-test-secret-0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app
      - name: Migrations apply cleanly
        run: alembic upgrade head
      - name: Tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint --if-present
      - run: npm run build

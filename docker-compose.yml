services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warrantylens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-warrantylens}
      POSTGRES_DB: ${POSTGRES_DB:-warrantylens}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warrantylens}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-warrantylens}:${POSTGRES_PASSWORD:-warrantylens}@postgres:5432/${POSTGRES_DB:-warrantylens}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-warrantylens}:${POSTGRES_PASSWORD:-warrantylens}@postgres:5432/${POSTGRES_DB:-warrantylens}
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      # AI pipeline — all stages enabled
      AI_ENABLED: "true"
      YOLO_ENABLED: "true"
      YOLO_WEIGHTS: /app/models/ev_defects.pt
      YOLO_CONF: "0.25"
      OCR_ENABLED: "true"
      ASR_ENABLED: "true"
      EMBEDDINGS_ENABLED: "true"
      VLM_ENABLED: "true"
      # VLM via host Ollama (rebound to 0.0.0.0); Qdrant in-network
      OLLAMA_URL: http://host.docker.internal:11434
      QDRANT_URL: http://qdrant:6333
      # Work around PaddlePaddle 3.x PIR/oneDNN CPU crash
      FLAGS_enable_pir_api: "0"
      FLAGS_use_mkldnn: "0"
      # Cache model weights here (mapped to a persistent volume below)
      HF_HOME: /home/appuser/.cache/huggingface
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./models:/app/models:ro
      - model_cache:/home/appuser/.cache
      - paddle_cache:/home/appuser/.paddlex
      - paddleocr_cache:/home/appuser/.paddleocr

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pg_data:
  minio_data:
  qdrant_data:
  model_cache:
  paddle_cache:
  paddleocr_cache:
